# GitLab CI — boogiepop-stock-market (remote MF en ECS /mf)
#
# develop (push): lint + vite-build; Docker/ECS MANUAL (staging).
# main (push): lint + vite-build + Docker/ECS AUTOMÁTICO → ECR :latest + rollout ECS.
#
# Variables (Settings → CI/CD → Variables):
# - AWS_ROLE_ARN (obligatoria para Docker/ECS vía OIDC)
# - ECR_REGISTRY, VITE_REMOTE_BASE tienen default en YAML (override opcional)
# - BYPASS_PROTECTED_FILES_CHECK=1 (solo Owner, emergencia)

include:
  - project: 'boogiepop-phatom/boogiepop-platform-guards'
    file: '/guards/protected-files.yml'
    ref: main

stages:
  - verify
  - build
  - deploy

default:
  interruptible: true

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

variables:
  AWS_DEFAULT_REGION: us-east-1
  AWS_ROLE_ARN: ""
  ECR_REGISTRY: "653876198281.dkr.ecr.us-east-1.amazonaws.com"
  REMOTE_ECR_REPOSITORY: boogiepop-remote
  ECS_CLUSTER_NAME: boogiepop-api-cluster
  ECS_FRONT_REMOTE_SERVICE_NAME: boogiepop-api-fe-remote-svc
  VITE_REMOTE_BASE: "http://boogiepop-api-alb-1499079717.us-east-1.elb.amazonaws.com/mf/"

check-ci-integrity:
  stage: verify
  image: alpine:3.19
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  script:
    - |
      apk add --no-cache git curl > /dev/null 2>&1
      if [ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-}" ]; then
        BASE="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
      elif [ "${CI_COMMIT_BEFORE_SHA:-}" = "0000000000000000000000000000000000000000" ] || [ -z "${CI_COMMIT_BEFORE_SHA:-}" ]; then
        echo "Primer commit — saltando check."
        exit 0
      else
        BASE="$CI_COMMIT_BEFORE_SHA"
      fi
      git fetch origin "$BASE" --depth=1 > /dev/null 2>&1 || true
      if ! git diff --name-only "$BASE" "$CI_COMMIT_SHA" | grep -qx "\.gitlab-ci\.yml"; then
        echo "OK: .gitlab-ci.yml no fue modificado."
        exit 0
      fi
      echo "PROTEGIDO: .gitlab-ci.yml fue modificado."
      if [ -n "${CI_MERGE_REQUEST_IID:-}" ]; then
        if [ -z "${PLATFORM_API_TOKEN:-}" ] || [ -z "${PLATFORM_OWNER_USERNAME:-}" ]; then
          echo "BLOQUEADO: PLATFORM_API_TOKEN o PLATFORM_OWNER_USERNAME no configurados."
          exit 1
        fi
        APPROVALS=$(curl -sf \
          --header "PRIVATE-TOKEN: ${PLATFORM_API_TOKEN}" \
          "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/approvals" \
          2>/dev/null || echo '{}')
        if echo "$APPROVALS" | grep -q "\"username\":\"${PLATFORM_OWNER_USERNAME}\""; then
          echo "OK: Owner (${PLATFORM_OWNER_USERNAME}) aprobó la MR — guard pasa."
          exit 0
        fi
        echo ""
        echo "BLOQUEADO: .gitlab-ci.yml es un archivo protegido."
        echo "Para desbloquear:"
        echo "  1. Pedile al Owner que abra esta MR y haga click en 'Approve'"
        echo "  2. Re-corré este pipeline"
        exit 1
      else
        echo "BLOQUEADO: .gitlab-ci.yml modificado en push directo — solo via MR con aprobación del Owner."
        exit 1
      fi

lint:
  stage: verify
  image: node:22-bookworm-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
    - when: never
  script:
    - npm ci
    - npm run lint

vite-build:
  stage: build
  image: node:22-bookworm-slim
  needs: ["lint"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
    - when: never
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

.docker_publish_remote:
  stage: deploy
  image: ubuntu:22.04
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  needs: ["vite-build"]
  variables:
    IMAGE_TAG: $CI_COMMIT_SHORT_SHA
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    FF_NETWORK_PER_BUILD: "1"
  before_script:
    - apt-get update -qq
    - DEBIAN_FRONTEND=noninteractive apt-get install -y -qq curl ca-certificates unzip gnupg
    - |
      set -eu
      if [ -z "${ECR_REGISTRY:-}" ]; then
        echo "ERROR: ECR_REGISTRY vacía."
        exit 1
      fi
      if [ -z "${AWS_ROLE_ARN:-}" ]; then
        echo "ERROR: falta AWS_ROLE_ARN para autenticación federada OIDC."
        exit 1
      fi
      if [ -z "${VITE_REMOTE_BASE:-}" ]; then
        echo "ERROR: VITE_REMOTE_BASE vacía — el MF no resolverá assets en prod."
        exit 1
      fi
      echo "Build remote MF: VITE_REMOTE_BASE=${VITE_REMOTE_BASE}"
    - install -dm755 /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - chmod a+r /etc/apt/keyrings/docker.gpg
    - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" > /etc/apt/sources.list.d/docker.list
    - apt-get update -qq
    - DEBIAN_FRONTEND=noninteractive apt-get install -y -qq docker-ce-cli docker-buildx-plugin
    - curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
    - unzip -q /tmp/awscliv2.zip -d /tmp
    - /tmp/aws/install -i /usr/local/aws-cli -b /usr/local/bin
    - export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab-oidc-token"
    - printf '%s' "${GITLAB_OIDC_TOKEN}" > "${AWS_WEB_IDENTITY_TOKEN_FILE}"
    - export AWS_ROLE_ARN AWS_DEFAULT_REGION
    - aws sts get-caller-identity
    - sleep 3
    - docker info
    - docker buildx create --name ci-remote-build --use 2>/dev/null || docker buildx use ci-remote-build
    - docker run --privileged --rm tonistiigi/binfmt:latest --install all
    - bash -cx 'REG_HOST=$(echo "${ECR_REGISTRY}" | cut -d/ -f1); aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" | docker login --username AWS --password-stdin "${REG_HOST}"'
  script:
    - |
      set -eux
      BASE_URI="${ECR_REGISTRY}/${REMOTE_ECR_REPOSITORY}"
      IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
      BUILD_ARGS="--build-arg VITE_REMOTE_BASE=${VITE_REMOTE_BASE:-/} --build-arg VITE_DEV_SERVER_ORIGIN=${VITE_DEV_SERVER_ORIGIN:-http://localhost:5173}"
      COMMON="docker buildx build --platform linux/arm64 --provenance=false --sbom=false --push ${BUILD_ARGS}"
      if [ "${CI_COMMIT_BRANCH}" = "main" ]; then
        ${COMMON} -t "${IMAGE_URI}" -t "${BASE_URI}:latest" .
      elif [ -n "${CI_COMMIT_TAG:-}" ]; then
        ${COMMON} -t "${IMAGE_URI}" -t "${BASE_URI}:latest" .
      else
        ${COMMON} -t "${IMAGE_URI}" -t "${BASE_URI}:develop" .
      fi

# Staging: manual en develop (igual host).
docker-publish-remote:
  extends: .docker_publish_remote
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push" && $AWS_ROLE_ARN'
      when: manual
    - when: never

# Prod: automático al mergear MR → main (push a main).
docker-publish-remote-prod:
  extends: .docker_publish_remote
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push" && $AWS_ROLE_ARN'
      when: on_success
    - when: never

deploy-remote-ecs:
  stage: deploy
  image:
    name: amazon/aws-cli:2.27.25
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  script:
    - |
      set -eu
      if [ -z "${AWS_ROLE_ARN:-}" ]; then
        echo "ERROR: falta AWS_ROLE_ARN para autenticación federada OIDC."
        exit 1
      fi
    - export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab-oidc-token"
    - printf '%s' "${GITLAB_OIDC_TOKEN}" > "${AWS_WEB_IDENTITY_TOKEN_FILE}"
    - export AWS_ROLE_ARN AWS_DEFAULT_REGION
    - aws sts get-caller-identity
    - aws ecs update-service --cluster "$ECS_CLUSTER_NAME" --service "$ECS_FRONT_REMOTE_SERVICE_NAME" --force-new-deployment --region "$AWS_DEFAULT_REGION"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push" && $AWS_ROLE_ARN'
      when: manual
    - when: never

deploy-remote-ecs-prod:
  stage: deploy
  image:
    name: amazon/aws-cli:2.27.25
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  needs: ["docker-publish-remote-prod"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push" && $AWS_ROLE_ARN'
      when: on_success
    - when: never
  before_script:
    - |
      set -eu
      if [ -z "${AWS_ROLE_ARN:-}" ]; then
        echo "ERROR: falta AWS_ROLE_ARN para autenticación federada OIDC."
        exit 1
      fi
  script:
    - export AWS_WEB_IDENTITY_TOKEN_FILE="/tmp/gitlab-oidc-token"
    - printf '%s' "${GITLAB_OIDC_TOKEN}" > "${AWS_WEB_IDENTITY_TOKEN_FILE}"
    - export AWS_ROLE_ARN AWS_DEFAULT_REGION
    - aws sts get-caller-identity
    - aws ecs update-service --cluster "$ECS_CLUSTER_NAME" --service "$ECS_FRONT_REMOTE_SERVICE_NAME" --force-new-deployment --region "$AWS_DEFAULT_REGION"
